<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFB72B" />
  <!-- iOS Safari / 홈 화면 추가 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="벌 질병탐지" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="/ontec_logo.png" />
  <link rel="icon" href="/ontec_logo.png" />
  <title>벌 질병탐지</title>
  <style>
    :root {
      --primary: #FFB72B;
      --primary-dark: #F5A623;
      --text: #333;
      --muted: #777;
      --bg: #F8F8F8;
      --card: #fff;
      --ok: #43A047;
      --warn: #FB8C00;
      --danger: #F44336;
      --line: #ececec;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--primary);
      color: #fff;
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    header img { height: 26px; width: auto; }
    header h1 { font-size: 17px; font-weight: 700; margin: 0; }
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: calc(96px + env(safe-area-inset-bottom));
    }
    .hint {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin: 8px 0 12px;
    }
    .notice {
      background: #FFF6E5;
      border: 1px solid #FFE2A8;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 12.5px;
      line-height: 1.55;
      color: #8a6d3b;
    }
    .notice p { margin: 0; }
    .notice p + p { margin-top: 5px; }
    .disclaimer {
      text-align: center;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
      margin: 18px 6px 4px;
    }
    .disclaimer b { color: var(--warn); }
    .result-disclaimer {
      padding: 10px 16px 14px;
      font-size: 11.5px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      line-height: 1.5;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .result-img { display: block; width: 100%; height: auto; background: #000; }
    .status-bar {
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .status-none   { background: var(--muted); }
    .status-normal { background: var(--ok); }
    .status-warning{ background: var(--warn); }
    .status-danger { background: var(--danger); }
    .det-list { padding: 6px 16px 14px; }
    .det-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }
    .det-item:last-child .det-row { border-bottom: none; }
    .det-name { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
    .badge-disease { font-size: 11px; color: var(--danger); border: 1px solid var(--danger); border-radius: 6px; padding: 1px 6px; }
    .det-meta { display: flex; align-items: center; gap: 8px; text-align: right; font-size: 13px; color: var(--muted); }
    .det-meta b { color: var(--text); font-size: 15px; }
    .det-row.has-detail { cursor: pointer; }
    .chev { display: inline-block; transition: transform .2s; color: var(--primary-dark); font-size: 12px; }
    .det-item.open .chev { transform: rotate(180deg); }
    .det-detail { display: none; padding: 4px 2px 14px; }
    .det-item.open .det-detail { display: block; animation: fade .2s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .det-detail .di-row { display: flex; gap: 8px; padding: 5px 0; font-size: 13px; line-height: 1.5; }
    .det-detail .di-k { flex: none; width: 72px; color: var(--primary-dark); font-weight: 700; }
    .det-detail .di-v { color: var(--text); }
    .det-detail ul { margin: 2px 0 0; padding-left: 18px; }
    .det-detail li { margin: 2px 0; }
    .result-actions { display: flex; gap: 10px; padding: 4px 16px 16px; }
    .rbtn {
      flex: 1; border: 1.5px solid var(--primary); background: #fff; color: var(--primary-dark);
      border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer;
      transition: transform .08s;
    }
    .rbtn:active { transform: scale(.97); background: #FFF6E5; }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 56px 20px;
      font-size: 15px;
      line-height: 1.6;
    }
    .empty .big { font-size: 44px; display: block; margin-bottom: 10px; }
    .spinner-wrap { text-align: center; padding: 56px 20px; color: var(--muted); }
    .spinner {
      width: 42px; height: 42px; margin: 0 auto 14px;
      border: 4px solid #eee; border-top-color: var(--primary);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: var(--danger); text-align: center; padding: 20px; font-size: 14px; }
    .actionbar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,.96);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      border-top: 1px solid var(--line);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      display: flex;
      gap: 10px;
      max-width: 640px;
      margin: 0 auto;
    }
    .btn {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 15px 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s, opacity .2s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:active { background: var(--primary-dark); }
    .btn-ghost { background: #fff; color: var(--primary-dark); border: 1.5px solid var(--primary); }
    .btn:disabled { opacity: .5; pointer-events: none; }
    input[type=file] { display: none; }
  </style>
</head>
<body>
  <header>
    <img src="/ontec_logo.png" alt="ONTEC" onerror="this.style.display='none'" />
    <h1>벌 질병탐지</h1>
  </header>

  <main>
    <p class="hint">벌 사진을 올리면 질병 탐지 결과를 바로 보여드립니다</p>

    <div class="notice">
      <p>📷 <b>카메라·사진 권한 안내</b> — 촬영 또는 선택한 사진은 분석을 위해서만 서버로 전송되며, 별도로 저장하거나 외부에 공유하지 않습니다.</p>
      <p>⚠️ 본 결과는 <b>참고용</b>이며, 수의사의 진단을 대체하지 않습니다.</p>
    </div>

    <div id="panel">
      <div class="empty" id="emptyState">
        <span class="big">🐝</span>
        아래 버튼을 눌러<br />벌 사진을 선택하거나 촬영하세요
      </div>
    </div>

    <p class="disclaimer">
      본 서비스의 탐지 결과는 <b>참고용</b>입니다.<br />
      정확한 진단과 치료는 반드시 수의사 등 전문가와 상담하세요.
    </p>
  </main>

  <div class="actionbar">
    <button class="btn btn-ghost" id="galleryBtn">📁 사진 선택</button>
    <button class="btn btn-primary" id="cameraBtn">📷 촬영</button>
  </div>

  <input type="file" id="galleryInput" accept="image/*" />
  <input type="file" id="cameraInput" accept="image/*" capture="environment" />

  <script>
    const panel = document.getElementById('panel');
    const galleryBtn = document.getElementById('galleryBtn');
    const cameraBtn = document.getElementById('cameraBtn');
    const galleryInput = document.getElementById('galleryInput');
    const cameraInput = document.getElementById('cameraInput');

    galleryBtn.addEventListener('click', () => galleryInput.click());
    cameraBtn.addEventListener('click', () => cameraInput.click());
    galleryInput.addEventListener('change', e => handleFile(e.target.files[0]));
    cameraInput.addEventListener('change', e => handleFile(e.target.files[0]));

    const STATUS_CLASS = {
      none: 'status-none', normal: 'status-normal',
      warning: 'status-warning', danger: 'status-danger'
    };

    function bgr2css(name) {
      return COLORS[name] || '#999';
    }
    // 백엔드 COLORS 와 동일 (RGB 표기)
    const COLORS = {
      'Larva_Normal': 'rgb(0,255,0)',
      'Larva_mite': 'rgb(255,0,0)',
      'Larva_Gypsum': 'rgb(0,0,255)',
      'Larva_Butterfly': 'rgb(255,165,0)',
      'Insect_normal': 'rgb(0,200,0)',
      'Insect_mite': 'rgb(255,0,128)',
      'insect_wing_crippled_virus_infection': 'rgb(255,255,0)'
    };

    function setBusy(busy) {
      galleryBtn.disabled = busy;
      cameraBtn.disabled = busy;
    }

    function esc(s) {
      return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    }

    let currentB64 = null;
    let currentSummary = '';

    // 질병 상세 정보 아코디언 토글 (이벤트 위임)
    panel.addEventListener('click', e => {
      const row = e.target.closest('.det-row.has-detail');
      if (row && row.parentElement) row.parentElement.classList.toggle('open');
    });

    // iPhone / iPad(iPadOS 13+ 는 데스크톱 UA 로 위장) 판별
    function isIOS() {
      return /iP(hone|ad|od)/.test(navigator.userAgent) ||
             (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    }

    function b64ToBlob(b64, type) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new Blob([bytes], { type: type || 'image/jpeg' });
    }

    function newFile() {
      const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '');
      return new File([b64ToBlob(currentB64)], 'bee_result_' + ts + '.jpg', { type: 'image/jpeg' });
    }

    function downloadFile(file) {
      const url = URL.createObjectURL(file);
      const a = document.createElement('a');
      a.href = url;
      a.download = file.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // 기기 사진 앱에 저장.
    // iOS Safari/WKWebView 는 <a download> 를 무시하므로 공유 시트의 "이미지 저장"으로 사진 앱에 저장한다.
    async function saveImage() {
      if (!currentB64) return;
      const file = newFile();
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: '벌 질병탐지 결과' });
          return; // 사용자가 시트에서 "사진에 저장" 선택 (또는 취소)
        } catch (err) {
          if (err && err.name === 'AbortError') return; // 사용자가 취소
          // 그 외 오류는 폴백으로 진행
        }
      }
      if (isIOS()) {
        // 구형 iOS: 새 탭으로 이미지를 띄워 길게 눌러 "사진에 추가" 하도록 안내
        const url = URL.createObjectURL(file);
        window.open(url, '_blank');
        alert('열린 이미지를 길게 눌러 "사진에 저장"을 선택하세요.');
        setTimeout(() => URL.revokeObjectURL(url), 60000);
        return;
      }
      downloadFile(file); // 데스크톱 / 안드로이드
    }

    async function shareImage() {
      if (!currentB64) return;
      const file = newFile();
      const text = currentSummary + ' (참고용 결과, 수의 진단을 대체하지 않습니다)';
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ title: '벌 질병탐지 결과', text, files: [file] }); return; } catch (err) {
          if (err && err.name === 'AbortError') return;
        }
      }
      if (navigator.share) {
        try { await navigator.share({ title: '벌 질병탐지 결과', text }); return; } catch (_) { return; }
      }
      downloadFile(file);
      alert('이 브라우저는 공유를 지원하지 않아 이미지를 저장했습니다.');
    }

    function detailHtml(info) {
      if (!info) return '';
      const li = (info.response || []).map(x => `<li>${esc(x)}</li>`).join('');
      const row = (k, v) => v ? `<div class="di-row"><span class="di-k">${k}</span><span class="di-v">${esc(v)}</span></div>` : '';
      return `
        <div class="det-detail">
          ${row('원인', info.cause)}
          ${row('증상', info.symptoms)}
          <div class="di-row"><span class="di-k">대처법</span><span class="di-v"><ul>${li}</ul></span></div>
          ${row('발생 시기', info.seasonal_info)}
          ${row('탐지 팁', info.detection_tips)}
          ${row('경제적 영향', info.economic_impact)}
          ${row('치료 전망', info.treatment_success)}
        </div>`;
    }

    async function handleFile(file) {
      if (!file) return;
      setBusy(true);
      panel.innerHTML = '<div class="card"><div class="spinner-wrap"><div class="spinner"></div>분석 중입니다...</div></div>';

      const fd = new FormData();
      fd.append('image', file);

      try {
        const res = await fetch('/api/detect', { method: 'POST', body: fd });
        if (!res.ok) {
          let msg = '분석에 실패했습니다.';
          try { msg = (await res.json()).detail || msg; } catch (_) {}
          throw new Error(msg);
        }
        render(await res.json());
      } catch (err) {
        panel.innerHTML = '<div class="card"><div class="err">⚠️ ' + err.message + '</div></div>';
      } finally {
        setBusy(false);
      }
    }

    function render(r) {
      currentB64 = r.annotated_image;
      currentSummary = r.summary || '';
      const details = r.disease_details || {};
      const statusCls = STATUS_CLASS[r.status] || 'status-none';

      let rows = '';
      if (r.detections.length === 0) {
        rows = '<div class="det-item"><div class="det-row"><span class="det-name">탐지된 객체 없음</span></div></div>';
      } else {
        rows = r.detections.map(d => {
          const info = d.is_disease ? details[d.class] : null;
          const hasDetail = !!info;
          return `
          <div class="det-item">
            <div class="det-row ${hasDetail ? 'has-detail' : ''}">
              <span class="det-name">
                <span class="dot" style="background:${bgr2css(d.class)}"></span>
                ${esc(d.class_kr)}
                ${d.is_disease ? '<span class="badge-disease">질병</span>' : ''}
              </span>
              <span class="det-meta"><b>${d.count}</b>건 · ${d.confidence}%${hasDetail ? '<span class="chev">▾</span>' : ''}</span>
            </div>
            ${hasDetail ? detailHtml(info) : ''}
          </div>`;
        }).join('');
      }

      panel.innerHTML = `
        <div class="card">
          <img class="result-img" src="data:image/jpeg;base64,${r.annotated_image}" alt="결과" />
          <div class="status-bar ${statusCls}">${esc(r.summary)}</div>
          <div class="det-list">${rows}</div>
          <div class="result-actions">
            <button class="rbtn" id="saveBtn">📷 사진 저장</button>
            <button class="rbtn" id="shareBtn">🔗 공유</button>
          </div>
          <div class="result-disclaimer">⚠️ 본 결과는 참고용이며, 수의사의 진단을 대체하지 않습니다.</div>
        </div>`;

      document.getElementById('saveBtn').addEventListener('click', saveImage);
      document.getElementById('shareBtn').addEventListener('click', shareImage);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
